---
name: Prek Hooks

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: prek-hooks-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.12

jobs:
  prek:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.WORGARSIDE_DEV_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv dependencies
        env:
          UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
        run: uv sync --locked --all-groups

      - name: Run prek
        id: run-prek
        uses: j178/prek-action@v2
        continue-on-error: true
        with:
          prek-version: 0.3.11
          extra-args: --all-files
          cache: true

      - name: Commit Modified Files
        if: steps.run-prek.outcome == 'failure'
        env:
          REF: ${{ github.event.pull_request.head.ref }}
        # yamllint disable rule:line-length
        run: |
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit, something else must have gone wrong. Check previous step for more information."
            exit 1
          fi

          git config --global user.name "worgarside-dev"
          git config --global user.email "worgarside.dev@gmail.com"

          git add .

          git commit -m "style: Fixes from prek hooks" --no-verify

          git push origin ${REF}

          UNCOMMITTED_FILES=$(git status -s | awk '{print $2}')

          if [[ -n "$UNCOMMITTED_FILES" ]]; then
            echo -e "\`\`\`\n${UNCOMMITTED_FILES}\n\`\`\`" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
        # yamllint enable rule:line-length
